<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task — To-Do Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0d0d12;
      --surface:  #13131a;
      --card:     #1a1a24;
      --border:   #2a2a3a;
      --accent:   #7c6aff;
      --success:  #4fdf90;
      --warn:     #ffb347;
      --danger:   #ff4f6a;
      --text:     #e8e8f0;
      --muted:    #6b6b90;
    }
    * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    }
    body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'DM Sans', sans-serif; 
    min-height: 100vh; 
    }

    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 230px; height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.8rem 1rem;
      display: flex; flex-direction: column; z-index: 100;
    }
    .logo { 
    font-family: 'Syne', sans-serif; 
    font-size: 1.4rem; 
    font-weight: 800; 
    letter-spacing: -.03em; 
    margin-bottom: 2rem; 
    padding-left: .5rem; 
    }
    .logo span { 
    color: var(--accent); 
    }

    .nav-btn {
      display: flex; 
      align-items: center; 
      gap: .7rem;
      padding: .6rem .9rem; 
      border-radius: 10px;
      color: var(--muted); 
      font-size: .85rem; 
      font-weight: 500;
      cursor: pointer; 
      border: none; 
      background: none;
      width: 100%; 
      text-align: left; 
      transition: all .2s; 
      margin-bottom: .2rem;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-btn:hover, .nav-btn.active { 
    background: rgba(124,106,255,.12); 
    color: var(--accent); 
    }
    .nav-btn i { 
    font-size: 1rem; 
    width: 18px; 
    }

    .sidebar-bottom { 
    margin-top: auto; 
    background: var(--card); 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    padding: .9rem 1rem; 
    }
    .sidebar-bottom .lbl { 
    font-size: .68rem; 
    color: var(--muted); 
    text-transform: uppercase; 
    letter-spacing: .08em; 
    margin-bottom: .6rem; 
    }
    .stat-row { 
    display: flex; 
    justify-content: space-between; 
    font-size: .78rem; 
    padding: .2rem 0; 
    }
    .dot { 
    width: 7px; 
    height: 7px; 
    border-radius: 50%; 
    display: inline-block; 
    margin-right: .4rem; 
    }

    .main { 
    margin-left: 230px; 
    padding: 2rem; 
    }

    .page-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
    margin-bottom: 1.5rem; 
    }
    .page-title { 
    font-family: 'Syne', sans-serif; 
    font-size: 1.8rem; 
    font-weight: 800; 
    letter-spacing: -.04em; 
    }
    .page-sub { 
    color: var(--muted);
    font-size: .85rem; 
    margin-top: .2rem; 
    }

    .btn-add {
      background: var(--accent); 
      color: #fff; 
      border: none; 
      border-radius: 10px;
      padding: .55rem 1.2rem; 
      font-size: .85rem; 
      font-weight: 600; 
      cursor: pointer;
      display: flex; 
      align-items: center; 
      gap: .4rem; 
      transition: background .2s, transform .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-add:hover { 
        background: #6a58e0; 
        transform: translateY(-1px); 
    }

    .stats-row { 
        display: grid; 
        grid-template-columns: repeat(3,1fr); 
        gap: .8rem; 
        margin-bottom: 1.5rem; }
    .stat-card { 
        background: var(--card); 
        border: 1px solid var(--border); 
        border-radius: 12px; 
        padding: 1rem 1.1rem; }
    .stat-card .num { 
        font-family: 'Syne', sans-serif; 
        font-size: 1.8rem; 
        font-weight: 800; 
    }
    .stat-card .slbl { 
        font-size: .75rem; 
        color: var(--muted); 
        margin-top: .1rem; 
    }

    .filter-row { 
        display: flex; 
        gap: .5rem; 
        margin-bottom: 1.2rem; 
        flex-wrap: wrap; 
    }
    .f-btn {
      padding: .38rem .9rem; 
      border-radius: 8px; 
      font-size: .8rem; 
      font-weight: 500;
      cursor: pointer; 
      border: 1px solid var(--border); 
      background: var(--surface);
      color: var(--muted); 
      transition: all .2s; 
      font-family: 'DM Sans', sans-serif;
    }
    .f-btn:hover, .f-btn.active { 
        border-color: var(--accent); 
        color: var(--accent); 
        background: rgba(124,106,255,.1); 
    }

    .cards-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); 
        gap: .9rem; }
    .task-card {
      background: var(--card); 
      border: 1px solid var(--border);
      border-radius: 14px; 
      padding: 1.1rem;
      position: relative; 
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }
    .task-card::before { 
        content:''; 
        position:absolute; 
        top:0; 
        left:0; 
        width:3px; 
        height:100%; }
    .task-card.high::before   { 
        background: var(--danger); 
    }
    .task-card.medium::before { 
        background: var(--warn); 
    }
    .task-card.low::before    { 
        background: var(--success); 
    }
    .task-card:hover { 
        border-color: var(--accent); 
        transform: translateY(-2px); 
    }

    .card-top { 
        display:flex; 
        justify-content:space-between; 
        align-items:flex-start; 
        margin-bottom:.7rem; 
    }
    .card-title { 
        font-family:'Syne',sans-serif; 
        font-size:.95rem; 
        font-weight:700; 
        line-height:1.3; 
        flex:1; padding-right:.5rem; 
    }
    .card-title.done { 
        text-decoration:line-through; 
        color:var(--muted); 
    }
    .card-actions { 
        display:flex; 
        gap:.35rem; }
    .ic-btn {
      width:28px; 
      height:28px; 
      border-radius:7px; 
      border:1px solid var(--border);
      background:var(--surface); 
      color:var(--muted); 
      display:flex; 
      align-items:center;
      justify-content:center; 
      cursor:pointer; 
      font-size:.75rem; 
      transition:all .2s;
    }
    .ic-btn.edit:hover { 
        border-color:var(--accent); 
        color:var(--accent); 
    }
    .ic-btn.del:hover  { 
        border-color:var(--danger);  
        color:var(--danger); }

    .card-desc { 
        font-size:.8rem; 
        color:var(--muted); 
        margin-bottom:.8rem; 
        line-height:1.5; 
    }
    .card-meta { 
        display:flex; 
        gap:.4rem; 
        flex-wrap:wrap; 
        align-items:center; 
    }

    .badge { 
        font-size:.67rem; 
        font-weight:600; 
        padding:.22rem .6rem; 
        border-radius:6px; 
        text-transform:uppercase; 
        letter-spacing:.05em; 
    }
    .b-pending     { 
        background:rgba(107,107,144,.2); 
        color:var(--muted); 
    }
    .b-in_progress { 
        background:rgba(124,106,255,.2); 
        color:var(--accent); 
    }
    .b-completed   { 
        background:rgba(79,223,144,.2);  
        color:var(--success); 
    }
    .b-high        { 
        background:rgba(255,79,106,.15); 
        color:var(--danger); 
    }
    .b-medium      { 
        background:rgba(255,179,71,.15); 
        color:var(--warn); 
    }
    .b-low         { 
        background:rgba(79,223,144,.15); 
        color:var(--success); 
    }
    .card-date { 
        font-size:.7rem; 
        color:var(--muted); 
        margin-left:auto; 
        display:flex; 
        align-items:center; 
        gap:.25rem; 
    }

    .empty { 
        text-align:center; 
        padding:4rem; 
        color:var(--muted); 
    }
    .empty i { 
        font-size:2.5rem; 
        opacity:.3; 
    }

    .modal-content { 
        background:var(--surface); 
        border:1px solid var(--border); 
        border-radius:16px; color:var(--text); 
    }
    .modal-header { 
        border-bottom:1px solid var(--border); 
        padding:1.1rem 1.4rem; }
    .modal-footer { 
        border-top:1px solid var(--border); 
    }
    .modal-title { 
        font-family:'Syne',sans-serif; 
        font-weight:700; 
        font-size:1rem; 
    }
    .btn-close { 
        filter:invert(1); 
    }
    .form-label { 
        font-size:.8rem; 
        font-weight:500; 
        color:var(--muted); 
        margin-bottom:.25rem; 
    }
    .form-control, .form-select { 
        background:var(--card); 
        border:1px solid var(--border); 
        color:var(--text); 
        border-radius:9px; 
        font-size:.85rem; 
        padding:.55rem .85rem; 
    }
    .form-control:focus, .form-select:focus { 
        background:var(--card); 
        border-color:var(--accent); 
        color:var(--text); 
        box-shadow:0 0 0 3px rgba(124,106,255,.15); 
    }
    .form-select option { 
        background:var(--surface); }
    .btn-save { 
        background:var(--accent); 
        color:#fff; border:none; 
        border-radius:9px; 
        padding:.55rem 1.4rem; 
        font-weight:600; 
        font-size:.85rem; 
        cursor:pointer; 
        font-family:'DM Sans',sans-serif; 
        transition:background .2s; 
    }
    .btn-save:hover { 
        background:#6a58e0; }
    .btn-cancel { 
        background:var(--card); 
        color:var(--muted); 
        border:1px solid var(--border); 
        border-radius:9px; 
        padding:.55rem 1.1rem; 
        font-size:.85rem; cursor:pointer; 
        font-family:'DM Sans',sans-serif; }

    .toast { 
        background:var(--surface); 
        border:1px solid var(--border); 
        color:var(--text); 
        border-radius:12px; 
        font-size:.83rem; }

    @media (max-width:768px) {
      .sidebar { 
        position:relative; 
        width:100%; 
        height:auto; 
        flex-direction:row; 
        flex-wrap:wrap; 
        padding:1rem; 
    }
      .sidebar-bottom { 
        display:none; 
    }
      .main { 
        margin-left:0; 
        padding:1rem; 
    }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Task<span>Flow</span></div>
  <nav>
    <button class="nav-btn active" onclick="setFilter('')"><i class="bi bi-grid-3x3-gap"></i> All Tasks</button>
    <button class="nav-btn" onclick="setFilter('pending')"><i class="bi bi-clock"></i> Pending</button>
    <button class="nav-btn" onclick="setFilter('in_progress')"><i class="bi bi-arrow-repeat"></i> In Progress</button>
    <button class="nav-btn" onclick="setFilter('completed')"><i class="bi bi-check-circle"></i> Completed</button>
  </nav>
  <div class="sidebar-bottom">
    <div class="lbl">Overview</div>
    <div class="stat-row"><span><span class="dot" style="background:var(--muted)"></span>Pending</span><strong id="s-pending">0</strong></div>
    <div class="stat-row"><span><span class="dot" style="background:var(--accent)"></span>In Progress</span><strong id="s-progress">0</strong></div>
    <div class="stat-row"><span><span class="dot" style="background:var(--success)"></span>Completed</span><strong id="s-done">0</strong></div>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">My Tasks</div>
      <div class="page-sub">Manage and track your to-dos</div>
    </div>
    <button class="btn-add" onclick="openAdd()"><i class="bi bi-plus-lg"></i> Add Task</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" style="color:var(--muted)" id="total">0</div>
      <div class="slbl">Total Tasks</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:var(--accent)" id="inprog">0</div>
      <div class="slbl">In Progress</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:var(--success)" id="done">0</div>
      <div class="slbl">Completed</div>
    </div>
  </div>

  <div class="filter-row">
    <button class="f-btn active" onclick="setFilter('')">All</button>
    <button class="f-btn" onclick="setFilter('pending')">Pending</button>
    <button class="f-btn" onclick="setFilter('in_progress')">In Progress</button>
    <button class="f-btn" onclick="setFilter('completed')">Completed</button>
  </div>

  <div id="taskGrid">
    <div class="empty"><div class="spinner-border text-secondary mb-3" role="status"></div><p>Loading tasks...</p></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal fade" id="taskModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Add Task</span>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <input type="hidden" id="taskId"/>
        <div class="mb-3">
          <label class="form-label">Title *</label>
          <input type="text" class="form-control" id="taskTitle" placeholder="What needs to be done?"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" id="taskDesc" rows="3" placeholder="Add details..."></textarea>
        </div>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label">Status</label>
            <select class="form-select" id="taskStatus">
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label">Priority</label>
            <select class="form-select" id="taskPriority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label">Due Date</label>
          <input type="date" class="form-control" id="taskDue"/>
        </div>
      </div>
      <div class="modal-footer gap-2 px-4 pb-4">
        <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-save" onclick="saveTask()">Save Task</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="liveToast" class="toast">
    <div class="toast-body d-flex align-items-center gap-2" id="toastMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API = 'api.php';
  let modal, toast, currentFilter = '';

  document.addEventListener('DOMContentLoaded', () => {
    modal = new bootstrap.Modal(document.getElementById('taskModal'));
    toast = new bootstrap.Toast(document.getElementById('liveToast'), { delay: 2500 });
    loadTasks();
  });

  async function loadTasks() {
    try {
      const url  = currentFilter ? `${API}?status=${currentFilter}` : API;
      const res  = await fetch(url);
      const data = await res.json();
      if (data.success) { renderCards(data.data); updateStats(data.data); }
    } catch { showToast('Cannot connect to API.', false); }
  }

  function renderCards(tasks) {
    const grid = document.getElementById('taskGrid');
    if (!tasks.length) {
      grid.innerHTML = `<div class="empty"><i class="bi bi-inbox"></i><p class="mt-2">No tasks here. Add one!</p></div>`;
      return;
    }
    grid.innerHTML = `<div class="cards-grid">${tasks.map(card).join('')}</div>`;
  }

  function card(t) {
    const due  = t.due_date ? new Date(t.due_date + 'T00:00:00').toLocaleDateString('en-PH', { month:'short', day:'numeric', year:'numeric' }) : '';
    const done = t.status === 'completed';
    return `
      <div class="task-card ${t.priority}">
        <div class="card-top">
          <div class="card-title ${done ? 'done' : ''}">${esc(t.title)}</div>
          <div class="card-actions">
            <button class="ic-btn edit" onclick="openEdit(${t.id})" title="Edit"><i class="bi bi-pencil"></i></button>
            <button class="ic-btn del"  onclick="delTask(${t.id})"  title="Delete"><i class="bi bi-trash"></i></button>
          </div>
        </div>
        ${t.description ? `<div class="card-desc">${esc(t.description)}</div>` : ''}
        <div class="card-meta">
          <span class="badge b-${t.status}">${statusLbl(t.status)}</span>
          <span class="badge b-${t.priority}">${cap(t.priority)}</span>
          ${due ? `<span class="card-date"><i class="bi bi-calendar3"></i>${due}</span>` : ''}
        </div>
      </div>`;
  }

  function updateStats(tasks) {
    const p = tasks.filter(t => t.status === 'pending').length;
    const i = tasks.filter(t => t.status === 'in_progress').length;
    const d = tasks.filter(t => t.status === 'completed').length;
    document.getElementById('total').textContent    = tasks.length;
    document.getElementById('inprog').textContent   = i;
    document.getElementById('done').textContent     = d;
    document.getElementById('s-pending').textContent  = p;
    document.getElementById('s-progress').textContent = i;
    document.getElementById('s-done').textContent     = d;
  }

  function setFilter(status) {
    currentFilter = status;
    const order = ['','pending','in_progress','completed'];
    document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i === order.indexOf(status)));
    document.querySelectorAll('.f-btn').forEach((b,i)  => b.classList.toggle('active', i === order.indexOf(status)));
    loadTasks();
  }

  function openAdd() {
    document.getElementById('modalTitle').textContent = 'Add Task';
    ['taskId','taskTitle','taskDesc','taskDue'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('taskStatus').value   = 'pending';
    document.getElementById('taskPriority').value = 'medium';
    modal.show();
  }

  async function openEdit(id) {
    const res  = await fetch(`${API}?id=${id}`);
    const data = await res.json();
    const t    = data.data;
    document.getElementById('modalTitle').textContent = 'Edit Task';
    document.getElementById('taskId').value       = t.id;
    document.getElementById('taskTitle').value    = t.title;
    document.getElementById('taskDesc').value     = t.description;
    document.getElementById('taskStatus').value   = t.status;
    document.getElementById('taskPriority').value = t.priority;
    document.getElementById('taskDue').value      = t.due_date ?? '';
    modal.show();
  }

  async function saveTask() {
    const id    = document.getElementById('taskId').value;
    const title = document.getElementById('taskTitle').value.trim();
    if (!title) { document.getElementById('taskTitle').focus(); return; }
    const body = {
      id: id || undefined, title,
      description: document.getElementById('taskDesc').value,
      status:      document.getElementById('taskStatus').value,
      priority:    document.getElementById('taskPriority').value,
      due_date:    document.getElementById('taskDue').value || null,
    };
    const res  = await fetch(API, { method: id ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    if (data.success) { modal.hide(); showToast(data.message, true); loadTasks(); }
    else showToast(data.message, false);
  }

  async function delTask(id) {
    if (!confirm('Delete this task?')) return;
    const res  = await fetch(`${API}?id=${id}`, { method:'DELETE' });
    const data = await res.json();
    if (data.success) { showToast(data.message, true); loadTasks(); }
  }

  function showToast(msg, ok) {
    document.getElementById('toastMsg').innerHTML = `<i class="bi bi-${ok ? 'check-circle-fill text-success' : 'x-circle-fill text-danger'}"></i> ${msg}`;
    toast.show();
  }

  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  const statusLbl = s => ({pending:'Pending', in_progress:'In Progress', completed:'Completed'}[s]);
</script>
</body>
</html>
